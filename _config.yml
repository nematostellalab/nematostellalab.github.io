# =========================
# SITE SETTINGS
# =========================

locale: "en-US"

title: "Nematostella Lab"
title_separator: "-"
name: "Whitney Leach, PhD"
description: "Behavior, circadian biology, and marine model systems"

url: "https://nematostellalab.github.io"
baseurl: "/nematostellalab"
repository: "nematostellalab/nematostellalab.github.io"

# =========================
# AUTHOR SIDEBAR
# =========================

author:
  avatar: "profile.png"
  name: "Nematostella Lab"
  bio: "With friends like these, who needs anemones"
  location: "Center Valley, PA"
  email: "whitney.leach@desales.edu"

  github: "nematostellalab"

# =========================
# IMPORTANT FIX FOR PAGES
# =========================

include:
  - _pages
  - files

# =========================
# COLLECTIONS (KEEP SIMPLE)
# =========================

collections:
  teaching:
    output: true
  publications:
    output: true
  portfolio:
    output: true
  talks:
    output: true

# =========================
# DEFAULTS
# =========================

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false

  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true

# =========================
# MARKDOWN
# =========================

markdown: kramdown
highlighter: rouge

# =========================
# PLUGINS (MINIMAL = STABLE)
# =========================

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# =========================
# OUTPUT
# =========================

permalink: /:categories/:title/

timezone: America/New_York

# =========================
# FILE HANDLING
# =========================

exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock

keep_files:
  - .git
